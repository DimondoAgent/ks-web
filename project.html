<!DOCTYPE html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/feather-icons/4.29.0/feather.min.js"></script>
  <style>
    :root{--bg:#080c12;--bg-alt:#060a0f;--card:#0d1320;--border:#1b2236;--accent:#3ddba8;--text:#dde2ec;--muted:#627088;--dim:#2d3a4f;}
    body{font-family:'Space Grotesk',sans-serif;background:var(--bg);color:var(--text);}
    .mono{font-family:'JetBrains Mono',monospace;}
    .nav-glass{background:rgba(8,12,18,0.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);}
    .term-card{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
    .term-hdr{background:#101725;padding:10px 16px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);}
    .mac-dot{width:12px;height:12px;border-radius:50%;}
    .tag{display:inline-block;padding:3px 11px;background:rgba(61,219,168,0.07);border:1px solid rgba(61,219,168,0.2);border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent);white-space:nowrap;}
    .btn-ghost{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;color:var(--muted);font-family:'JetBrains Mono',monospace;font-size:13px;text-decoration:none;transition:color 0.2s;}
    .btn-ghost:hover{color:var(--text);}
    .bullet{color:var(--accent);flex-shrink:0;margin-right:8px;}
    
    /* Стили для переключателя языков */
    .lang-switcher{display:flex;align-items:center;gap:2px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;padding:3px;}
    .lang-btn{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;padding:4px 9px;border-radius:4px;transition:all 0.18s;letter-spacing:0.04em;}
    .lang-btn:hover{color:var(--text);}
    .lang-btn.active{background:var(--accent);color:var(--bg);font-weight:600;}
  </style>
</head>
<body class="antialiased min-h-screen flex flex-col">
  <nav class="nav-glass fixed top-0 left-0 right-0 z-50">
    <div class="max-w-5xl mx-auto px-6 py-4 flex justify-between items-center">

        </a>
        
        <div class="lang-switcher">

  </nav>

                <div class="flex flex-wrap gap-3 mb-10" id="tags"></div>

                <div class="flex flex-wrap gap-4 pt-6 border-t border-gray-800" id="links"></div>
            </div>
        </div>
    </div>

    <div id="error" class="hidden text-center py-20">

  </main>

    const projectId = params.get('id');
    const project = data[projectId];

    // Функция обновления страницы при смене языка
    function renderProject(lang) {
        if (project) {
            const p = project[lang];
            document.getElementById('content').classList.remove('hidden');
            document.getElementById('term-title').textContent = project.file;
            document.getElementById('title').textContent = p.title;
            document.getElementById('tech-stack').textContent = p.tech;
            document.getElementById('desc').textContent = p.desc;

            const featuresUl = document.getElementById('features');
            featuresUl.innerHTML = ''; // Очищаем старые фичи
            p.features.forEach(f => {
                const li = document.createElement('li');
                li.className = "flex items-start";
                li.innerHTML = `<span class="bullet">▸</span><span>${f}</span>`;
                featuresUl.appendChild(li);
            });

            const tagsDiv = document.getElementById('tags');
            tagsDiv.innerHTML = ''; // Очищаем старые теги
            p.tags.forEach(t => {
                const span = document.createElement('span');
                span.className = "tag";
                span.textContent = t;
                tagsDiv.appendChild(span);
            });

            const linksDiv = document.getElementById('links');
            linksDiv.innerHTML = ''; // Очищаем старые ссылки
            p.links.forEach(l => {
                const a = document.createElement('a');
                a.href = l.url;
                a.target = "_blank";
                a.className = "flex items-center text-sm px-4 py-2 bg-[var(--border)] text-white rounded hover:bg-[var(--dim)] transition-colors mono";
                a.innerHTML = `<i data-feather="${l.icon}" class="w-4 h-4 mr-2" style="color:var(--accent)"></i> ${l.label}`;
                linksDiv.appendChild(a);
            });

            feather.replace();
        } else {
            document.getElementById('error').classList.remove('hidden');
        }
    }

    function setLang(lang) {
        localStorage.setItem('ks_lang', lang);
        
        // Обновляем статические тексты
        const t = T[lang];
        document.querySelectorAll('[data-i18n]').forEach(el => {
            const key = el.dataset.i18n;
            if (t[key] !== undefined) el.textContent = t[key];
        });

        // Обновляем активную кнопку в навигации
        document.querySelectorAll('.lang-btn').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.lang === lang);
        });

        // Перерисовываем контент проекта на новом языке
        renderProject(lang);
    }

    // При загрузке страницы читаем сохраненный язык (по умолчанию 'en')
    const savedLang = localStorage.getItem('ks_lang') || 'en';
    setLang(savedLang);

</body>
